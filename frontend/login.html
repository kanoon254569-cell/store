<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - E-Commerce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .form-box {
            background: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .button:hover {
            background: #5568d3;
        }
        
        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
        }
        
        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <div id="message"></div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <h1>🔐 Login</h1>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="button">Login</button>
                </form>
                
                <div class="toggle-form">
                    Don't have an account? <a onclick="toggleForms()">Register here</a>
                </div>
            </div>
            
            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <h1>📝 Register</h1>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" required placeholder="johndoe">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required placeholder="your@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required placeholder="••••••••">
                    </div>
                    
                    <div class="form-group">
                        <label>Account Type</label>
                        <select id="regRole" required>
                            <option value="user">👤 Customer (Buy products)</option>
                            <option value="provider">🏪 Provider (Sell products)</option>
                            <option value="admin">👨‍💼 Admin (Manage system)</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="button">Register</button>
                </form>
                
                <div class="toggle-form">
                    Already have an account? <a onclick="toggleForms()">Login here</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-detect API base URL based on current host
        const API_BASE = `http://${window.location.hostname}:8002`;
        
        function toggleForms() {
            document.getElementById("loginForm").classList.toggle("hidden");
            document.getElementById("registerForm").classList.toggle("hidden");
            document.getElementById("message").innerHTML = "";
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            
            try {
                showMessage("🔄 Logging in...", "success");
                
                // Use query parameters for login
                const response = await fetch(`${API_BASE}/api/auth/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Store token in localStorage
                    localStorage.setItem("auth_token", data.access_token);
                    localStorage.setItem("user_id", data.user_id);
                    
                    showMessage("✅ Login successful!", "success");
                    
                    // Redirect based on email
                    setTimeout(() => {
                        if (email.includes("admin")) {
                            window.location.href = "/admin-dashboard.html";
                        } else if (email.includes("provider")) {
                            window.location.href = "/provider-panel.html";
                        } else {
                            window.location.href = "/user-store.html";
                        }
                    }, 800);
                } else {
                    try {
                        const error = await response.json();
                        const errorMsg = error.detail || error.message || "Login failed";
                        showMessage(`❌ ${String(errorMsg)}`, "error");
                    } catch (e) {
                        showMessage(`❌ Login failed (Status: ${response.status})`, "error");
                    }
                }
            } catch (error) {
                console.error("Login error:", error);
                showMessage(`❌ Connection error: ${String(error.message)}`, "error");
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById("regUsername").value;
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;
            const role = document.getElementById("regRole").value;
            
            try {
                showMessage("🔄 Creating account...", "success");
                
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email,
                        username,
                        password,
                        role
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Store token
                    localStorage.setItem("auth_token", data.access_token);
                    localStorage.setItem("user_id", data.user_id);
                    
                    showMessage("✅ Registration successful! Redirecting...", "success");
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (role === "admin") {
                            window.location.href = "/admin-dashboard.html";
                        } else if (role === "provider") {
                            window.location.href = "/provider-panel.html";
                        } else {
                            window.location.href = "/user-store.html";
                        }
                    }, 1500);
                } else {
                    try {
                        const error = await response.json();
                        const errorMsg = error.detail || error.message || "Registration failed";
                        showMessage(`❌ ${String(errorMsg)}`, "error");
                    } catch (e) {
                        showMessage(`❌ Registration failed (Status: ${response.status})`, "error");
                    }
                }
            } catch (error) {
                console.error("Register error:", error);
                showMessage(`❌ Connection error: ${String(error.message)}`, "error");
            }
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById("message");
            msgDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
        }
    </script>
</body>
</html>
